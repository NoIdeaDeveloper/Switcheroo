  <!-- Small joey peeking from pouch -->
  <circle cx="60" cy="84" r="6" fill="#F5B8A0"/>
  <circle cx="63" cy="83" r="1.5" fill="#8B5E3C"/>
  <ellipse cx="57" cy="79" rx="2.5" ry="3.5" fill="#F5B8A0"/>
  <ellipse cx="62" cy="78" rx="2" ry="3" fill="#F5B8A0"/>
</svg>
