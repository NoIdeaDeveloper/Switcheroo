<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Switcheroo</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- ── Header ─────────────────────────────────────── -->
  <header class="header">
    <div class="header-inner">
      <img src="icons/icon48.png" alt="Switcheroo kangaroo" class="header-icon" width="40" height="40">
      <div class="header-text">
        <span class="header-title">Switcheroo</span>
        <span class="header-subtitle">Hop, redirect, repeat.</span>
      </div>
    </div>
  </header>

  <!-- ── Service cards ──────────────────────────────── -->
  <main class="services" id="services">
    <div class="loading-wrap">
      <div class="loading-spinner"></div>
      <span>Loading…</span>
    </div>
  </main>

  <!-- ── Footer ─────────────────────────────────────── -->
  <footer class="footer">
    <button class="footer-btn" id="btn-refresh">
      <svg class="footer-btn-icon" id="refresh-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M13.65 2.35A8 8 0 1 0 15 8h-2a6 6 0 1 1-1.1-3.47L10 6h5V1l-1.35 1.35Z" fill="currentColor"/>
      </svg>
      Refresh All
    </button>
    <button class="footer-btn footer-btn-primary" id="btn-settings">
      Settings
      <svg class="footer-btn-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M6.5 1.5h3l.5 1.5a4.5 4.5 0 0 1 1.06.62l1.56-.5 1.5 2.6-1.2 1.05a4.6 4.6 0 0 1 0 1.46l1.2 1.05-1.5 2.6-1.56-.5A4.5 4.5 0 0 1 10 11.98l-.5 1.52h-3L6 11.98a4.5 4.5 0 0 1-1.06-.62l-1.56.5-1.5-2.6 1.2-1.05a4.6 4.6 0 0 1 0-1.46L1.88 5.7l1.5-2.6 1.56.5A4.5 4.5 0 0 1 6 2.98L6.5 1.5Z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
        <circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.2"/>
      </svg>
    </button>
  </footer>

  <script type="module" src="popup.js"></script>
</body>
</html>
