<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Switcheroo</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- ── Header ─────────────────────────────────────── -->
  <header class="header">
    <div class="header-logo">
      <img src="icons/icon48.png" alt="Switcheroo kangaroo" class="header-icon" width="36" height="36">
      <div class="header-text">
        <span class="header-title">Switcheroo</span>
        <span class="header-subtitle">Your Privacy Pal</span>
      </div>
    </div>
  </header>

  <!-- ── Service cards ──────────────────────────────── -->
  <main class="services" id="services">
    <!-- Populated by popup.js -->
    <div class="loading">Loading…</div>
  </main>

  <!-- ── Footer ─────────────────────────────────────── -->
  <footer class="footer">
    <button class="btn-ghost" id="btn-refresh" title="Refresh instance lists">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M13.65 2.35A8 8 0 1 0 15 8h-2a6 6 0 1 1-1.1-3.47L10 6h5V1l-1.35 1.35Z" fill="currentColor"/>
      </svg>
      Refresh
    </button>
    <button class="btn-ghost" id="btn-settings" title="Open full settings">
      Settings
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M13 3H3a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V4a1 1 0 0 0-1-1ZM6 7l2-2 2 2M8 5v6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M10 3V2M6 3V2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
  </footer>

  <script type="module" src="popup.js"></script>
</body>
</html>
